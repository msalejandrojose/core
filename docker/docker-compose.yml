services:
  mysql:
    build:
      context: ./mysql
    image: core-mysql:local
    container_name: core-mysql
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # API — solo se levanta con --profile full (./run.sh full)
  # Para iteración rápida del backend conviene seguir usando `pnpm dev:api`
  # contra mysql levantado en local.
  api:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: core-api:local
    container_name: core-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Variables de conexión a BBDD — las consumirá la API cuando
      # añadamos el ORM (Prisma / TypeORM / Drizzle).
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${API_PORT:-3000}:3000"

volumes:
  mysql_data:
    name: core-mysql-data
