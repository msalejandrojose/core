services:
  mysql:
    build:
      context: ./mysql
    image: core-mysql:local
    container_name: core-mysql
    restart: unless-stopped
    env_file: .env
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # API — se levanta con los perfiles `api` o `full` (./run.sh api|full).
  # Para iteración rápida del backend conviene seguir usando `pnpm dev:api`
  # contra mysql levantado en local (./run.sh).
  api:
    profiles: ["api", "full"]
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    image: core-api:local
    container_name: core-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    # Carga JWT_SECRET, MAIL_*, STORAGE_*, etc. desde los .env de apps/api.
    # `.env` sobrescribe a `.env.local` (defaults no-secretos del equipo).
    # El bloque `environment:` de abajo gana sobre ambos para forzar DB_HOST=mysql.
    env_file:
      - path: ../apps/api/.env.local
        required: true
      - path: ../apps/api/.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      # Orígenes permitidos por CORS — los deriva `run.sh` de stack.config.json
      # (URLs de los frontends habilitados) y los exporta antes de levantar.
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    ports:
      - "${API_PORT:-3000}:3000"
    # Persistimos el storage local entre recreates del contenedor para que los
    # ficheros subidos con STORAGE_DRIVER=LOCAL no se pierdan al reiniciar.
    volumes:
      - api_storage:/app/.storage

  # Reverse proxy local: enruta los subdominios *.aj-local.es a cada pieza.
  # `run.sh` regenera ./Caddyfile desde stack.config.json antes de levantar.
  # Se activa con cualquier perfil que sirva tráfico web.
  proxy:
    profiles: ["api", "backoffice", "web", "full"]
    image: caddy:2-alpine
    container_name: core-proxy
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    # Permite que Caddy alcance los frontends que corren en el host (runMode host).
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
    name: core-mysql-data
  api_storage:
    name: core-api-storage
