<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <!-- theme-color por esquema; el ThemeProvider lo ajusta en caliente. -->
    <meta
      name="theme-color"
      content="#F0EFEC"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#1C1B19"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <!-- El manifest y el registro del service worker los inyecta
         vite-plugin-pwa en el build (MOB-15). -->
    <title>Core</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Aplica el tema persistido antes del primer paint (sin parpadeo). El
         store lo mantiene después; ver theme.store / ThemeProvider (MOB-17). -->
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('core-mobile-theme');
          var theme = raw ? JSON.parse(raw).state.theme : 'system';
          if (theme === 'light' || theme === 'dark') {
            document.documentElement.setAttribute('data-theme', theme);
          }
        } catch (e) {
          /* sin preferencia guardada: manda prefers-color-scheme */
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
