name: Deploy web (reusable)

# Build + deploy real de apps/web (Astro SSG) a Cloudflare Pages. Workflow
# reutilizable: lo llaman tanto `deploy.yml` (push/merge a main) como
# `blog-deploy.yml` (rebuild automático al publicar/editar/retirar un post
# del blog desde el backoffice). Única fuente de verdad para no duplicar los
# pasos de build+deploy en dos sitios.
on:
  workflow_call:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web (astro check + build)
        run: pnpm build:web
        env:
          # Opcionales: si no defines estas Variables en el repo, Astro usa sus
          # fallbacks (site → https://aj.es). Recomendado fijarlas para el sitemap/OG.
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}

      - name: Read Cloudflare project name
        id: cloudflare
        # Fuente única del nombre de proyecto: apps/web/.env.local (committed).
        # Evita tenerlo hardcodeado en el workflow.
        run: |
          project_name=$(grep -m1 '^CLOUDFLARE_PROJECT_NAME=' apps/web/.env.local | cut -d '=' -f2-)
          if [ -z "$project_name" ]; then
            echo "::error::CLOUDFLARE_PROJECT_NAME no está definido en apps/web/.env.local"
            exit 1
          fi
          echo "project_name=$project_name" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # El proyecto de Pages debe existir en Cloudflare (ver README/setup).
          # --branch=main marca el deploy como PRODUCCIÓN (rama de producción del proyecto).
          command: pages deploy apps/web/dist --project-name=${{ steps.cloudflare.outputs.project_name }} --branch=main
